<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DVD Bounce</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: white;
    }

    #logo {
      position: absolute;
      width: 500px; /* change size here */
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <img id="logo" src="rinicom.png" alt="DVD Logo" />

  <script>
    const logo = document.getElementById("logo");

    let x = 100;
    let y = 100;
    let vx = 3;  // speed X
    let vy = 3;  // speed Y

    function animate() {
      const w = window.innerWidth;
      const h = window.innerHeight;

      const rect = logo.getBoundingClientRect();
      const logoW = rect.width;
      const logoH = rect.height;

      x += vx;
      y += vy;

      // bounce off left/right
      if (x <= 0) {
        x = 0;
        vx *= -1;
      } else if (x + logoW >= w) {
        x = w - logoW;
        vx *= -1;
      }

      // bounce off top/bottom
      if (y <= 0) {
        y = 0;
        vy *= -1;
      } else if (y + logoH >= h) {
        y = h - logoH;
        vy *= -1;
      }

      logo.style.left = x + "px";
      logo.style.top = y + "px";

      requestAnimationFrame(animate);
    }

    // Start once image is loaded (ensures correct dimensions)
    logo.onload = () => {
      requestAnimationFrame(animate);
    };
  </script>
</body>
</html>
