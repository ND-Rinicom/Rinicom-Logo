<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centered Image</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    img {
      max-width: 100%;
      max-height: 100%;
      animation: redraw 16ms steps(1, end) infinite;
      will-change: transform;
    }

    @keyframes redraw {
      0% {
        transform: translate3d(0, 0, 0);
      }
      50% {
        transform: translate3d(0.001px, 0, 0);
      }
      100% {
        transform: translate3d(0, 0, 0);
      }
    }
  </style>
</head>
<body>
  <img src="rinicom-logo.webp" alt="Centered Image" />
</body>
</html>
